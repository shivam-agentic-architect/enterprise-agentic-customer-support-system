version: '3.8'

services:
  # 1. Next.js Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always

  # 2. FastAPI Python Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/lauki_care
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super_secure_enterprise_ai_secret_key_rotation_994
      - JWT_ALGORITHM=HS256
      - AWS_ACCESS_KEY_ID=""
      - AWS_SECRET_ACCESS_KEY=""
      - AWS_REGION=us-east-1
      - BEDROCK_MODEL_ID=anthropic.claude-3-5-sonnet-20241022-v2:0
      - OPENSEARCH_HOST=http://opensearch:9200
      - LOG_LEVEL=INFO
    depends_on:
      - db
      - redis
      - opensearch
    restart: always

  # 3. Database service (PostgreSQL)
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lauki_care
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount DB Initialization bootstrapper SQL script
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: always

  # 4. Cache engine service (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  # 5. Vector Database service (OpenSearch)
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      # Disable security settings for straightforward local HTTP vector integrations
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: always

volumes:
  postgres_data:
  opensearch_data:
